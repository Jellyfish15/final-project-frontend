name: Daily Video Cache Refresh

on:
  schedule:
    # Run daily at 1 AM UTC (adjust timezone as needed)
    - cron: "0 1 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  refresh-cache:
    runs-on: ubuntu-latest
    env:
      CACHE_REFRESH_SECRET: ${{ secrets.CACHE_REFRESH_SECRET }}
    steps:
      - name: Trigger cache refresh
        run: |
          echo "Refreshing video cache..."
          if [ -z "$CACHE_REFRESH_SECRET" ]; then
            echo "❌ CACHE_REFRESH_SECRET is missing"
            exit 1
          fi

          API_BASE="${{ secrets.VITE_API_URL }}"
          API_BASE="${API_BASE%/}"
          API_BASE="${API_BASE%/api}"
          REFRESH_URL="$API_BASE/api/youtube-cache/refresh"
          STATS_URL="$API_BASE/api/youtube-cache/stats"

          echo "Using refresh URL: $REFRESH_URL"
          response=$(curl -sS -X POST "$REFRESH_URL" \
            -H "Content-Type: application/json" \
            -H "x-service-token: $CACHE_REFRESH_SECRET" \
            -d '{"count": 28}' \
            -w "\nHTTP Status: %{http_code}")

          echo "$response"

          # Check if request was successful (200-299 status code)
          http_code=$(echo "$response" | grep -oP 'HTTP Status: \K\d+')
          if [[ $http_code =~ ^2 ]]; then
            echo "✅ Cache refresh successful"
          else
            echo "❌ Cache refresh failed with HTTP $http_code"
            if [ "$http_code" = "401" ]; then
              echo "Hint: Verify CACHE_REFRESH_SECRET matches backend env CACHE_REFRESH_SECRET exactly."
            fi
            exit 1
          fi

      - name: Check cache stats
        run: |
          echo "Checking cache statistics..."
          API_BASE="${{ secrets.VITE_API_URL }}"
          API_BASE="${API_BASE%/}"
          API_BASE="${API_BASE%/api}"
          curl -sS "$API_BASE/api/youtube-cache/stats" | jq '.'
