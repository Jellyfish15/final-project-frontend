<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- App Icons and Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- Mobile-optimized viewport -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- App metadata -->
    <title>Nudl - Educational Videos</title>
    <meta
      name="description"
      content="Discover and learn with educational videos on Nudl"
    />
    <meta name="author" content="Nudl Team" />

    <!-- Mobile Safari specific -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Nudl" />

    <!-- Microsoft Edge/Windows -->
    <meta name="msapplication-TileColor" content="#646cff" />
    <meta name="msapplication-config" content="/browserconfig.xml" />

    <!-- Theme colors -->
    <meta
      name="theme-color"
      content="#646cff"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#242424"
      media="(prefers-color-scheme: dark)"
    />

    <!-- Start Single Page Apps for GitHub Pages -->
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash,
          );
        }
      })(window.location);
    </script>
    <!-- End Single Page Apps for GitHub Pages -->
  </head>
  <body>
    <div id="root">
      <!-- Instant loading screen (shows before any JS loads) -->
      <div
        id="warmup-screen"
        style="
          position: fixed;
          inset: 0;
          z-index: 9999;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background: #121212;
          color: #fff;
          font-family:
            -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto,
            sans-serif;
        "
      >
        <div style="font-size: 2.5rem; font-weight: 700; margin-bottom: 1rem">
          Nudl
        </div>
        <div
          id="warmup-spinner"
          style="
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255, 255, 255, 0.15);
            border-top-color: #646cff;
            border-radius: 50%;
            animation: warmup-spin 0.8s linear infinite;
          "
        ></div>
        <div
          id="warmup-status"
          style="
            margin-top: 1rem;
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.6);
          "
        >
          Loading...
        </div>
        <style>
          @keyframes warmup-spin {
            to {
              transform: rotate(360deg);
            }
          }
        </style>
      </div>
    </div>

    <!-- Pre-warm the backend while JS bundles load -->
    <script>
      (function () {
        // Vite replaces %VITE_API_URL% at build time with the env value
        var apiUrl = "%VITE_API_URL%";
        // During dev, the raw placeholder stays — fall back to relative /api
        if (!apiUrl || apiUrl.indexOf("%") === 0) apiUrl = "";
        // Strip trailing /api if present so we can add /api/health cleanly
        var baseUrl = apiUrl.replace(/\/api\/?$/, "");
        var healthUrl = baseUrl + "/api/health";

        var statusEl = document.getElementById("warmup-status");
        var attempts = 0;
        var maxAttempts = 30;
        var ready = false;

        function ping() {
          if (ready || attempts >= maxAttempts) return;
          attempts++;
          if (statusEl) {
            if (attempts <= 1) statusEl.textContent = "Connecting to server...";
            else if (attempts <= 5)
              statusEl.textContent = "Waking up server...";
            else statusEl.textContent = "Almost there... (" + attempts + "s)";
          }
          fetch(healthUrl, { mode: "cors" })
            .then(function (r) {
              return r.json();
            })
            .then(function (data) {
              if (data.status === "OK" || data.dbReady) {
                ready = true;
                if (statusEl) statusEl.textContent = "Ready!";
              } else {
                setTimeout(ping, 2000);
              }
            })
            .catch(function () {
              setTimeout(ping, 2000);
            });
        }

        // Start pinging immediately
        ping();
      })();
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
